<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BJJ Concepts — A Foundational Curriculum</title>
    <meta name="description" content="A concept-first Brazilian Jiu-Jitsu curriculum covering Levels 1-7: fundamentals through system integration.">
    <meta name="theme-color" content="#1a1a2e">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:wght@300;400;700&display=swap"
        rel="stylesheet">

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="app.css">
</head>

<body class="reader">

    <!-- Top Bar -->
    <header class="reader__topbar" id="topbar">
        <div class="reader__topbar-left">
            <button class="reader__icon-btn reader__icon-btn--menu" id="menuBtn" aria-label="Open table of contents">
                <span class="material-symbols-outlined">menu_book</span>
            </button>
            <span class="reader__topbar-title" id="topbarTitle">BJJ Concepts</span>
        </div>
        <div class="reader__topbar-right">
            <button class="reader__icon-btn reader__icon-btn--home" id="homeBtn" aria-label="Return to home">
                <span class="material-symbols-outlined">home</span>
            </button>
            <button class="reader__icon-btn" id="searchBtn" aria-label="Search">
                <span class="material-symbols-outlined">search</span>
            </button>
        </div>
    </header>

    <!-- Search Overlay -->
    <div class="reader__search-overlay" id="searchOverlay" hidden>
        <div class="reader__search-bar">
            <span class="material-symbols-outlined reader__search-bar-icon">search</span>
            <input type="text" id="searchInput" class="reader__search-input"
                placeholder="Search concepts, positions, techniques..." autocomplete="off" autofocus>
            <button class="reader__icon-btn reader__search-close" id="searchClose" aria-label="Close search">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="reader__search-results" id="searchResults" aria-live="polite"></div>
    </div>

    <!-- Sidebar / Table of Contents -->
    <aside class="reader__sidebar" id="sidebar">
        <div class="reader__sidebar-header">
            <h2 class="reader__sidebar-title">Table of Contents</h2>
            <button class="reader__icon-btn reader__sidebar-close" id="sidebarClose" aria-label="Close table of contents">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <nav class="reader__toc" id="toc" aria-label="Table of contents">
            <!-- TOC sections generated by JS -->
        </nav>
    </aside>

    <!-- Sidebar Overlay (mobile) -->
    <div class="reader__sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="reader__main" id="mainContent">

        <!-- Welcome / Home Screen -->
        <section class="reader__home" id="homeScreen">
            <div class="reader__home-hero">
                <h1 class="reader__home-title">BJJ Concepts</h1>
                <p class="reader__home-subtitle">A Foundational Curriculum</p>
                <p class="reader__home-desc">A concept-first approach to Brazilian Jiu-Jitsu. Seven levels from
                    foundational mechanics to complete system integration.</p>
            </div>

            <div class="reader__home-actions">
                <button class="reader__btn reader__btn--primary" id="startReadingBtn">
                    <span class="material-symbols-outlined">auto_stories</span>
                    Start Reading
                </button>
                <button class="reader__btn reader__btn--accent" id="continueReadingBtn" hidden>
                    <span class="material-symbols-outlined">bookmark</span>
                    Continue Reading
                </button>
                <button class="reader__btn reader__btn--secondary" id="browseBtn">
                    <span class="material-symbols-outlined">list</span>
                    Browse Contents
                </button>
            </div>

            <div class="reader__home-sections" id="homeSections">
                <!-- Section cards generated by JS -->
            </div>
        </section>

        <!-- Document Reader -->
        <article class="reader__document" id="documentView" hidden>
            <div class="reader__document-meta" id="docMeta">
                <span class="reader__document-section" id="docSection"></span>
                <span class="reader__document-number" id="docNumber"></span>
                <button class="reader__icon-btn reader__bookmark-btn" id="bookmarkBtn" aria-label="Bookmark this section">
                    <span class="material-symbols-outlined">bookmark</span>
                </button>
            </div>
            <div class="reader__document-body" id="docBody"></div>

            <!-- Chapter Navigation -->
            <nav class="reader__chapter-nav" id="chapterNav" aria-label="Chapter navigation">
                <button class="reader__chapter-btn reader__chapter-btn--prev" id="prevBtn" aria-label="Previous chapter">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <div class="reader__chapter-btn-text">
                        <span class="reader__chapter-btn-label">Previous</span>
                        <span class="reader__chapter-btn-title" id="prevTitle"></span>
                    </div>
                </button>
                <button class="reader__chapter-btn reader__chapter-btn--next" id="nextBtn" aria-label="Next chapter">
                    <div class="reader__chapter-btn-text">
                        <span class="reader__chapter-btn-label">Next</span>
                        <span class="reader__chapter-btn-title" id="nextTitle"></span>
                    </div>
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </nav>
        </article>

    </main>

    <!-- Bottom Navigation (mobile) -->
    <nav class="reader__bottombar" id="bottomBar" aria-label="Navigation">
        <button class="reader__bottombar-btn" id="bottomHome" aria-label="Home">
            <span class="material-symbols-outlined">home</span>
            <span class="reader__bottombar-label">Home</span>
        </button>
        <button class="reader__bottombar-btn" id="bottomSearch" aria-label="Search">
            <span class="material-symbols-outlined">search</span>
            <span class="reader__bottombar-label">Search</span>
        </button>
        <button class="reader__bottombar-btn" id="bottomToc" aria-label="Contents">
            <span class="material-symbols-outlined">menu_book</span>
            <span class="reader__bottombar-label">Contents</span>
        </button>
        <button class="reader__bottombar-btn" id="bottomPrev" aria-label="Previous" disabled>
            <span class="material-symbols-outlined">arrow_back</span>
            <span class="reader__bottombar-label">Prev</span>
        </button>
        <button class="reader__bottombar-btn" id="bottomNext" aria-label="Next" disabled>
            <span class="material-symbols-outlined">arrow_forward</span>
            <span class="reader__bottombar-label">Next</span>
        </button>
    </nav>

    <!-- App Script -->
    <script src="app.js"></script>
</body>

</html>
